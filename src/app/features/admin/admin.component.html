<div class="dashboard">
  <nav class="navbar">
    <h2>Admin Portal</h2>
    <button (click)="logout()">Logout</button>
  </nav>
  <main class="content">
    <h1>Welcome, Admin</h1>
    <p>Role: {{ userRole }}</p>

    <!-- Create Product Form -->
    <section class="create-product">
      <h2>Create New Product</h2>
      <form (ngSubmit)="createProduct()">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" [(ngModel)]="newProduct.name" name="name" required />
        </div>
        <div class="form-group">
          <label>Price</label>
          <input type="number" step="0.01" [(ngModel)]="newProduct.price" name="price" required />
        </div>
        <button type="submit" class="btn-primary">Create Product</button>
      </form>
      <div class="message" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
    </section>

    <!-- Products List -->
    <section class="products-list">
      <h2>All Products</h2>
      <div *ngIf="loading" class="loading">Loading products...</div>
      <div *ngIf="!loading && products.length === 0" class="no-products">No products found.</div>

      <table *ngIf="!loading && products.length > 0" class="products-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of products">
            <td>{{ product.name }}</td>
            <td>$ {{ product.price | number: '1.2-2' }}</td>
            <td>
              <button class="btn-delete" (click)="deleteProduct(product.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</div>
